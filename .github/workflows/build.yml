name: Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: pyinstaller --onefile --paths . main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Youtube_conversor-${{ matrix.os }}
          path: |
            dist/Youtube_conversor
            dist/Youtube_conversor.exe